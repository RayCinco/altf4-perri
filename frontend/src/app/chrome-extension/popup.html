<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chismis Detector</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="container">
      <!-- MODE + TYPE -->
      <div class="top">
        <select id="modeSelect" class="select">
          <option value="genz">Perri Mode</option>
          <option value="formal">Formal Mode</option>
        </select>

        <select id="typeSelect" class="select">
          <option value="text">Text</option>
          <option value="url">URL</option>
          <option value="image">Image</option>
        </select>
      </div>

      <!-- INPUTS -->
      <div class="center-box">
        <textarea
          id="textInput"
          class="input active"
          placeholder="Paste chismis..."
        ></textarea>

        <input id="urlInput" class="input" placeholder="Paste URL..." />

        <!-- IMAGE BOX -->
        <div id="imageBox" class="image-box input">
          <input type="file" id="imageInput" class="hidden" accept="image/*" />

          <div id="imageDrop" class="image-drop">
            📎 Paste (Ctrl+V) / Upload Image<br /><br />
            <button id="uploadBtn">Choose File</button>
          </div>

          <img id="imagePreview" class="preview hidden" />
          <button id="removeImage" class="remove-btn hidden">Remove</button>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="button-row">
        <button id="analyzeBtn" class="primary-btn">Analyze</button>
      </div>

      <!-- RESULT -->
      <div class="result">
        <div id="status">Your analysis will appear here.</div>

        <div id="analysisUI" class="hidden">
          <div class="meter">
            <div id="meterFill"></div>
          </div>

          <div class="percent-row">
            <span id="chismisPercent"></span>
            <span id="realPercent"></span>
          </div>

          <div id="classification"></div>
          <div id="comparison"></div>
          <div id="sources"></div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
